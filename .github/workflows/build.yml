name: Build LuneOS for OnePlus 6

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  full-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup full build environment
      run: |
        sudo apt update
        sudo apt install -y \
          git build-essential diffstat texinfo gawk chrpath socat \
          cpio python3 python3-pip python3-pexpect xz-utils debianutils \
          iputils-ping python3-git python3-jinja2 libegl1-mesa libsdl1.2-dev \
          xterm python3-subunit mesa-common-dev zstd liblz4-tool file locales
        sudo locale-gen en_US.UTF-8

    - name: Create workspace
      run: |
        mkdir -p $HOME/luneos-build
        cd $HOME/luneos-build

    - name: Clone LuneOS setup
      run: |
        cd $HOME/luneos-build
        git clone https://github.com/webOS-ports/webos-ports-setup.git
        cd webos-ports-setup

    - name: Initialize build environment
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        mkdir -p conf
        echo 'TOPDIR = "$PWD/build"' > conf/topdir.conf
        source setup-env

    - name: Add OnePlus 6 support layer
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        source setup-env
        mkdir -p meta-luneos-oneplus6/conf/machine
        mkdir -p meta-luneos-oneplus6/recipes-kernel/linux
        mkdir -p meta-luneos-oneplus6/recipes-support/lxc
        cp $GITHUB_WORKSPACE/conf/machine/oneplus6.conf meta-luneos-oneplus6/conf/machine/
        cp $GITHUB_WORKSPACE/recipes-kernel/linux/linux-oneplus6_4.9.bb meta-luneos-oneplus6/recipes-kernel/linux/
        cp $GITHUB_WORKSPACE/recipes-support/lxc/lxc_4.0.bb meta-luneos-oneplus6/recipes-support/lxc/

    - name: Configure build for OnePlus 6
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        source setup-env
        mkdir -p build/conf
        echo 'MACHINE = "oneplus6"' > build/conf/local.conf
        echo 'DISTRO = "luneos"' >> build/conf/local.conf
        echo '' >> build/conf/local.conf
        echo '# LXC 支持' >> build/conf/local.conf
        echo 'IMAGE_INSTALL_append = " lxc lxc-templates"' >> build/conf/local.conf
        echo '' >> build/conf/local.conf
        echo '# 构建优化' >> build/conf/local.conf
        echo 'BB_NUMBER_THREADS = "4"' >> build/conf/local.conf
        echo 'PARALLEL_MAKE = "-j 4"' >> build/conf/local.conf
        echo '' >> build/conf/local.conf
        echo '# 镜像配置' >> build/conf/local.conf
        echo 'IMAGE_ROOTFS_SIZE = "3145728"' >> build/conf/local.conf
        echo 'IMAGE_ROOTFS_EXTRA_SPACE = "131072"' >> build/conf/local.conf
        echo '' >> build/conf/local.conf
        echo '# 减少构建大小' >> build/conf/local.conf
        echo 'INHERIT += "rm_work"' >> build/conf/local.conf
        echo 'NO_RECOMMENDATIONS = "1"' >> build/conf/local.conf

    - name: Start kernel build
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        source setup-env
        echo "开始构建内核..."
        bitbake linux-oneplus6
      timeout-minutes: 120

    - name: Start full system build
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        source setup-env
        echo "开始构建完整系统..."
        bitbake luneos-image
      timeout-minutes: 240

    - name: Generate flashable image
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        source setup-env
        echo "生成刷机镜像..."
        bitbake luneos-image-sdimg
      timeout-minutes: 60

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: luneos-oneplus6-full-image
        path: $HOME/luneos-build/webos-ports-setup/tmp/deploy/images/oneplus6/
        retention-days: 30

    - name: Create release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: $HOME/luneos-build/webos-ports-setup/tmp/deploy/images/oneplus6/*.wic*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quick-verify:
    runs-on: ubuntu-22.04
    needs: full-build

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: luneos-oneplus6-full-image

    - name: Verify build output
      run: |
        echo "✅ 构建验证完成"
        ls -la
        echo "可用的刷机文件:"
        find . -name "*.wic*" -o -name "*.img" | head -10
