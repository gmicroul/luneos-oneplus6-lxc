name: Build LuneOS for OnePlus 6

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  full-build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup full build environment
      run: |
        sudo apt update
        sudo apt install -y \
          git build-essential diffstat texinfo gawk chrpath socat \
          cpio python3 python3-pip python3-pexpect xz-utils debianutils \
          iputils-ping python3-git python3-jinja2 libegl1-mesa libsdl1.2-dev \
          xterm python3-subunit mesa-common-dev zstd liblz4-tool file locales
        sudo locale-gen en_US.UTF-8

    - name: Create workspace
      run: |
        mkdir -p $HOME/luneos-build
        cd $HOME/luneos-build

    - name: Clone webOS-ports setup and initialize layers
      run: |
        cd $HOME/luneos-build
        # 克隆 webos-ports-setup 仓库
        git clone --depth 1 https://github.com/webOS-ports/webos-ports-setup.git
        cd webos-ports-setup
        
        # 使用 Makefile 初始化完整环境
        make setup-common
        make webos-ports/.configured
        
        # 更新 layers (下载 bitbake, openembedded-core 等)
        cd webos-ports
        echo "Starting layer initialization..."
        
        # 检查 layers.txt 是否存在
        if [ ! -f "conf/layers.txt" ]; then
          echo "ERROR: layers.txt not found!"
          ls -la conf/
          exit 1
        fi
        
        # 使用 layers.awk 初始化所有 layers
        # 注意：layers.awk 在父目录的 scripts 目录下
        export OE_SOURCE_DIR="$PWD"
        env gawk -v command=update -f ../scripts/layers.awk conf/layers.txt
        
        # 验证关键 layers 是否已下载
        echo "=== Verifying layer downloads ==="
        for layer in bitbake openembedded-core meta-openembedded meta-webos-ports meta-pine64-luneos meta-smartphone meta-arm meta-rockchip meta-raspberrypi meta-qt6 meta-clang; do
          if [ -d "$layer" ]; then
            echo "✓ $layer exists"
          else
            echo "✗ $layer MISSING"
          fi
        done
        
        # 显示目录结构
        echo "=== Directory structure ==="
        ls -la
        echo "=== Checking for bitbake ==="
        ls -la bitbake/bin/bitbake 2>/dev/null || echo "bitbake not found"
        echo "=== Checking openembedded-core ==="
        ls -la openembedded-core 2>/dev/null || echo "openembedded-core not found"

    - name: Initialize build environment and build kernel
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        mkdir -p conf
        echo "TOPDIR=\"$PWD\"" > conf/topdir.conf
        source setup-env
        echo "TOPDIR after setup-env: $TOPDIR"
        if [ -z "$TOPDIR" ]; then
          export TOPDIR="$PWD"
          echo "Set TOPDIR to $TOPDIR"
        fi
        
        mkdir -p meta-luneos-oneplus6/conf/machine
        mkdir -p meta-luneos-oneplus6/recipes-kernel/linux
        mkdir -p meta-luneos-oneplus6/recipes-support/lxc
        cp $GITHUB_WORKSPACE/conf/machine/oneplus6.conf meta-luneos-oneplus6/conf/machine/
        cp $GITHUB_WORKSPACE/recipes-kernel/linux/linux-oneplus6_4.9.bb meta-luneos-oneplus6/recipes-kernel/linux/
        cp $GITHUB_WORKSPACE/recipes-support/lxc/lxc_4.0.bb meta-luneos-oneplus6/recipes-support/lxc/
        
        mkdir -p build/conf
        echo 'MACHINE = "oneplus6"' > build/conf/local.conf
        echo 'DISTRO = "luneos"' >> build/conf/local.conf
        echo 'IMAGE_INSTALL_append = " lxc lxc-templates"' >> build/conf/local.conf
        echo 'BB_NUMBER_THREADS = "4"' >> build/conf/local.conf
        echo 'PARALLEL_MAKE = "-j 4"' >> build/conf/local.conf
        echo 'INHERIT += "rm_work"' >> build/conf/local.conf
        echo 'NO_RECOMMENDATIONS = "1"' >> build/conf/local.conf
        
        echo "=== Starting kernel build ==="
        echo "TOPDIR: $TOPDIR"
        echo "Current dir: $(pwd)"
        echo "Looking for bitbake..."
        
        # 查找 bitbake - 现在应该在 webos-ports 目录下
        BITBAKE_PATH=""
        if [ -f "$PWD/bitbake/bin/bitbake" ]; then
          BITBAKE_PATH="$PWD/bitbake/bin/bitbake"
        elif [ -f "$TOPDIR/bitbake/bin/bitbake" ]; then
          BITBAKE_PATH="$TOPDIR/bitbake/bin/bitbake"
        else
          BITBAKE_PATH=$(which bitbake 2>/dev/null || find . -name "bitbake" -type f 2>/dev/null | head -1)
        fi
        
        if [ -z "$BITBAKE_PATH" ] || [ ! -f "$BITBAKE_PATH" ]; then
          echo "Error: bitbake not found in any expected location"
          echo "Searching..."
          find . -name "bitbake" 2>/dev/null | head -10
          exit 1
        fi
        
        echo "Using bitbake: $BITBAKE_PATH"
        python3 "$BITBAKE_PATH" linux-oneplus6

    - name: Start full system build
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        source setup-env
        if [ -z "$TOPDIR" ]; then
          export TOPDIR="$PWD"
        fi
        BITBAKE_PATH="$TOPDIR/bitbake/bin/bitbake"
        if [ ! -f "$BITBAKE_PATH" ]; then
          BITBAKE_PATH=$(which bitbake 2>/dev/null || echo "")
        fi
        python3 "$BITBAKE_PATH" luneos-image
      timeout-minutes: 240

    - name: Generate flashable image
      run: |
        cd $HOME/luneos-build/webos-ports-setup
        source setup-env
        if [ -z "$TOPDIR" ]; then
          export TOPDIR="$PWD"
        fi
        BITBAKE_PATH="$TOPDIR/bitbake/bin/bitbake"
        if [ ! -f "$BITBAKE_PATH" ]; then
          BITBAKE_PATH=$(which bitbake 2>/dev/null || echo "")
        fi
        python3 "$BITBAKE_PATH" luneos-image-sdimg
      timeout-minutes: 60

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: luneos-oneplus6-full-image
        path: $HOME/luneos-build/webos-ports-setup/tmp/deploy/images/oneplus6/
        retention-days: 30

    - name: Create release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: $HOME/luneos-build/webos-ports-setup/tmp/deploy/images/oneplus6/*.wic*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quick-verify:
    runs-on: ubuntu-22.04
    needs: full-build

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: luneos-oneplus6-full-image

    - name: Verify build output
      run: |
        echo "✅ 构建验证完成"
        ls -la
        echo "可用的刷机文件:"
        find . -name "*.wic*" -o -name "*.img" | head -10
